name: Deploy Proxy to Compute VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      # Authentication has been performed by the `auth` step above.
      - name: Confirm authentication
        run: |
          gcloud auth list
          gcloud config set project "${{ secrets.GCP_PROJECT }}"

      - name: SSH to VM and update proxy
        run: |
          if [ -z "${{ secrets.GCP_VM_INSTANCE }}" ] || [ -z "${{ secrets.GCP_VM_ZONE }}" ]; then
            echo "ERROR: GCP_VM_INSTANCE and GCP_VM_ZONE secrets must be set"
            exit 1
          fi

          # gcloud compute ssh requires the instance name and zone; if they
          # are empty the command will fail with "could not parse resource".
          gcloud compute ssh "${{ secrets.GCP_VM_INSTANCE }}" \
            --zone="${{ secrets.GCP_VM_ZONE }}" \
            --command="cd /path/to/proxy && docker-compose pull && docker-compose up -d"
