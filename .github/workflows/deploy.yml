name: Deploy Proxy to Compute VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      # Authentication has been performed by the `auth` step above.
      - name: Confirm authentication
        run: |
          gcloud auth list
          gcloud config set project "${{ secrets.GCP_PROJECT }}"

      - name: SSH to VM and update proxy
        run: |
          if [ -z "${{ secrets.GCP_VM_INSTANCE }}" ]; then
            echo "ERROR: GCP_VM_INSTANCE secret must be set"
            exit 1
          fi

          # determine the instance's zone dynamically so we don't have to store
          # it in a separate secret. using `describe` without a zone fails,
          # so instead query the list and filter by name; the output is just the
          # bare zone (e.g. us-east1-a).
          INSTANCE="${{ secrets.GCP_VM_INSTANCE }}"

          # debug: show all instances we can see in this project so we can
          # verify the name and zone are correct if detection fails.
          echo "Listing instances for debugging:"
          gcloud compute instances list --format="table(name,zone)"

          ZONE=$(gcloud compute instances list \
            --filter="name=$INSTANCE" \
            --format="value(zone)")

          # allow an explicit secret as a fallback if automatic detection
          # doesn't work (e.g. wrong project or permissions). this keeps
          # compatibility with older workflows.
          if [ -z "$ZONE" ] && [ -n "${{ secrets.GCP_VM_ZONE }}" ]; then
            echo "Warning: auto-detection failed, using GCP_VM_ZONE secret"
            ZONE="${{ secrets.GCP_VM_ZONE }}"
          fi

          if [ -z "$ZONE" ]; then
            echo "ERROR: could not determine zone for instance $INSTANCE"
            exit 1
          fi

          gcloud compute ssh "$INSTANCE" \
            --zone="$ZONE" \
            --command="docker-compose pull && docker-compose up -d"
