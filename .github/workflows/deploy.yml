name: Deploy Proxy to Compute VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate gcloud
        run: |
          set -x
          # write service account JSON to stdin to avoid persisting on disk
          echo "${{ secrets.GCP_SA_KEY }}" | gcloud auth activate-service-account --key-file=-
          gcloud config set project "${{ secrets.GCP_PROJECT }}"

      - name: SSH to VM and update proxy
        run: |
          gcloud compute ssh "${{ secrets.GCP_VM_INSTANCE }}" \
            --zone="${{ secrets.GCP_VM_ZONE }}" \
            --command="cd /path/to/proxy && docker-compose pull && docker-compose up -d"
